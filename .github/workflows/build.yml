name: 'Build & Release'
 
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
 
jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # Apple Silicon (M1/M2/M3...)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'   # Intel Macs
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'   # Linux: .deb, .rpm, .AppImage
            args: ''
          - platform: 'windows-latest' # Windows: .msi
            args: ''
 
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
 
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
 
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
 
      - name: Install frontend dependencies
        run: npm install
 
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Casterm ${{ github.ref_name }}'
          releaseBody: 'See the attached installers below. Linux users: the .AppImage is the easiest option (see INSTALL-LINUX.md).'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
 
